<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملف الإنجاز - مهند علي حسين</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
<style>
:root { --primary:#2c3e50; --gold:#d4af37; --paper:#ffffff; }
body {
  font-family:'Cairo',sans-serif; background: #bdc3c7;
  margin:0; min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; overflow: hidden;
}

.book-container { 
  perspective: 2000px; width: 90vw; max-width: 450px; 
  aspect-ratio: 3/4; position: relative;
}

.book { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }

/* الصفحة - جعلناها أخف ما يمكن */
.page {
  width: 100%; height: 100%; position: absolute;
  top: 0; left: 0; transform-origin: right center;
  transition: transform 0.7s cubic-bezier(0.15, 0, 0.15, 1);
  transform-style: preserve-3d; background: var(--paper);
  border-radius: 4px 12px 12px 4px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  display: none; /* إخفاء افتراضي لكل الصفحات */
}

.page.active, .page.flipped, .page.next-up {
  display: block; /* إظهار الصفحة الحالية والسابقة والتالية فقط */
}

.page-front, .page-back {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex; flex-direction: column; padding: 15px;
}

.page-back { transform: rotateY(180deg); background: #eee; }
.page.flipped { transform: rotateY(-180deg); }

.cover {
  background: linear-gradient(135deg, #2c3e50, #1a252f);
  color: var(--gold); border-right: 8px solid var(--gold);
  justify-content: center; text-align: center;
}

.page-image { 
  width: 100%; height: 82%; object-fit: contain; 
  background: #fff; border-radius: 5px; pointer-events: none;
}

.nav-controls { display: flex; gap: 30px; margin-top: 30px; z-index: 500; }
.btn-circle {
  width: 65px; height: 65px; border-radius: 50%;
  background: var(--primary); color: var(--gold);
  display: flex; align-items:center; justify-content:center;
  font-size: 24px; cursor: pointer; border: 3px solid var(--gold);
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.upload-btn {
  position: fixed; bottom: 25px; left: 25px; 
  background: var(--gold); color: #2c3e50;
  padding: 12px 25px; border-radius: 30px;
  font-weight: bold; cursor: pointer; z-index: 1000;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.modal {
  display: none; position: fixed; inset: 0; 
  background: rgba(0,0,0,0.9); z-index: 9999;
  justify-content: center; align-items: center;
}
.modal-content {
  background: white; padding: 30px; border-radius: 20px;
  width: 90%; max-width: 500px;
}
</style>
</head>
<body>

<div class="upload-btn" onclick="openModal('authModal')">📤 رفع أعمالي</div>

<div class="book-container">
  <div class="book" id="book">
    <div class="page active" id="p0" onclick="toggleFlip(this)">
      <div class="page-front cover">
        <h1 class="font-bold text-3xl mb-4" style="font-family:'Amiri'">ملف الإنجاز</h1>
        <p>تصميم مهند علي حسين</p>
        <div class="mt-8 opacity-40 text-xs text-white">انقر للتقليب</div>
      </div>
      <div class="page-back"></div>
    </div>
  </div>
</div>

<div class="nav-controls">
  <button class="btn-circle" onclick="flipPrev()">▶</button>
  <button class="btn-circle" onclick="flipNext()">◀</button>
</div>

<div id="authModal" class="modal">
  <div class="modal-content">
    <h3 class="text-xl font-bold mb-4">🔐 دخول المسؤول</h3>
    <input type="password" id="adminPass" placeholder="الرمز السري" class="w-full border-2 p-3 rounded-lg mb-4">
    <button id="loginBtn" class="w-full bg-slate-800 text-white py-3 rounded-lg">دخول</button>
    <button onclick="closeModal('authModal')" class="w-full mt-2 text-gray-400">إغلاق</button>
  </div>
</div>

<div id="addModal" class="modal">
  <div class="modal-content">
    <h3 class="text-xl font-bold mb-4">🆕 إضافة عمل</h3>
    <input type="text" id="driveLink" placeholder="رابط جوجل درايف" class="w-full border-2 p-3 rounded-lg mb-3">
    <input type="text" id="pageDesc" placeholder="اسم التصميم / ملاحظات" class="w-full border-2 p-3 rounded-lg mb-4">
    <button id="savePageBtn" class="w-full bg-amber-500 text-white py-3 rounded-lg">حفظ</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD-sGsgLVZSidrgiAuP7NkDr3zKaCdRPEY",
    authDomain: "book-552.firebaseapp.com",
    projectId: "book-552",
    storageBucket: "book-552.firebasestorage.app",
    messagingSenderId: "252586078518",
    appId: "1:252586078518:web:2fe02dac779c3da4d74397"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const pagesCol = collection(db, "portfolio_pages");

  let pagesData = [];

  onSnapshot(query(pagesCol, orderBy("createdAt", "asc")), (snapshot) => {
    pagesData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderPages();
  });

  function renderPages() {
    const book = document.getElementById('book');
    const cover = document.getElementById('p0');
    book.innerHTML = '';
    book.appendChild(cover);

    pagesData.forEach((data, index) => {
      const page = document.createElement('div');
      page.className = 'page';
      page.onclick = function() { toggleFlip(this); };
      page.innerHTML = `
        <div class="page-front">
          <img src="https://drive.google.com/thumbnail?id=${data.driveId}&sz=w800" class="page-image">
          <p class="text-center mt-4 font-bold text-gray-700">${data.desc || ''}</p>
          <button onclick="deletePage(event, '${data.id}')" class="text-red-500 text-[10px] mt-auto">حذف</button>
        </div>
        <div class="page-back"></div>
      `;
      book.appendChild(page);
    });

    const end = document.createElement('div');
    end.className = 'page';
    end.innerHTML = '<div class="page-front cover"><h2>تم بحمد الله</h2></div><div class="page-back"></div>';
    book.appendChild(end);
    
    updateZIndex();
  }

  window.toggleFlip = function(el) {
    el.classList.toggle('flipped');
    updateZIndex();
  }

  window.updateZIndex = function() {
    const pages = Array.from(document.querySelectorAll('.page'));
    const total = pages.length;

    pages.forEach((page, i) => {
      // إزالة كل الحالات القديمة
      page.classList.remove('active', 'next-up');
      
      if (page.classList.contains('flipped')) {
        page.style.zIndex = i;
      } else {
        page.style.zIndex = total - i;
      }
    });

    // المنطق السحري: إظهار الصفحة الحالية، السابقة (لو كانت بتقلب)، والتالية فقط
    const currentIdx = pages.findIndex(p => !p.classList.contains('flipped'));
    
    if (currentIdx !== -1) {
      pages[currentIdx].classList.add('active'); // الحالية
      if (currentIdx > 0) pages[currentIdx - 1].classList.add('active'); // السابقة اللي اتقلبت
      if (currentIdx < total - 1) pages[currentIdx + 1].classList.add('next-up'); // الجاية في الدور
    }
  }

  window.flipNext = () => {
    const page = [...document.querySelectorAll('.page')].find(p => !p.classList.contains('flipped'));
    if (page) toggleFlip(page);
  }

  window.flipPrev = () => {
    const pages = [...document.querySelectorAll('.page')];
    const page = pages.reverse().find(p => p.classList.contains('flipped'));
    if (page) toggleFlip(page);
  }

  // Modals
  window.openModal = (id) => document.getElementById(id).style.display = 'flex';
  window.closeModal = (id) => document.getElementById(id).style.display = 'none';

  document.getElementById('loginBtn').onclick = () => {
    if(document.getElementById('adminPass').value === "4753") {
      closeModal('authModal'); openModal('addModal');
    } else alert("كلمة السر خطأ");
  };

  document.getElementById('savePageBtn').onclick = async () => {
    const link = document.getElementById('driveLink').value;
    const driveId = link.match(/(?:\/d\/|id=)([\w-]+)/)?.[1];
    if(driveId) {
      await addDoc(pagesCol, { 
        driveId, 
        desc: document.getElementById('pageDesc').value, 
        createdAt: Date.now() 
      });
      alert("✅ تم إضافة الصورة بنجاح");
      document.getElementById('driveLink').value = "";
      document.getElementById('pageDesc').value = "";
      closeModal('addModal');
    }
  };

  window.deletePage = async (e, id) => {
    e.stopPropagation();
    if(confirm("حذف؟")) await deleteDoc(doc(db, "portfolio_pages", id));
  }
</script>
</body>
</html>
