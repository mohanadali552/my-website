<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملف الإنجاز - تصميم مهند علي حسين</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
<style>
:root { --primary:#2c3e50; --gold:#d4af37; --paper:#fdfdfd; }
body {
  font-family:'Cairo',sans-serif;
  background: #bdc3c7;
  margin:0; min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; overflow: hidden;
}

.book-container { 
  perspective: 1500px; 
  width: 90vw; max-width: 500px; 
  aspect-ratio: 3/4; 
  position: relative;
}

.book { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }

.page {
  width: 100%; height: 100%; position: absolute;
  top: 0; left: 0; transform-origin: right center;
  transition: transform 0.6s ease-in-out, opacity 0.3s;
  transform-style: preserve-3d;
  background: var(--paper);
  border-radius: 4px 12px 12px 4px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  will-change: transform;
}

.page-front, .page-back {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  display: flex; flex-direction: column; padding: 20px;
}

.page-back { transform: rotateY(180deg); background: #e0e0e0; }
.page.flipped { transform: rotateY(-180deg); }

.cover {
  background: linear-gradient(135deg, #2c3e50, #1a252f);
  color: var(--gold); border-right: 8px solid var(--gold);
  justify-content: center; text-align: center;
}

.page-image { 
  width: 100%; height: 80%; object-fit: contain; 
  background: #fff; border-radius: 5px; 
}

/* أزرار التحكم */
.nav-controls { display: flex; gap: 20px; margin-top: 25px; z-index: 100; }
.btn-circle {
  width: 60px; height: 60px; border-radius: 50%;
  background: var(--primary); color: var(--gold);
  display: flex; align-items:center; justify-content:center;
  font-size: 24px; cursor: pointer; border: 2px solid var(--gold);
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  transition: 0.3s;
}
.btn-circle:hover { transform: scale(1.1); background: #1a252f; }

/* زر رفع الملفات الجديد الجميل */
.upload-btn {
  position: fixed; bottom: 30px; left: 30px; 
  background: var(--gold); color: #2c3e50;
  width: 150px; height: 50px; border-radius: 25px;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; cursor: pointer; z-index: 1000;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  transition: 0.3s;
}
.upload-btn:hover { transform: translateY(-5px); box-shadow: 0 15px 25px rgba(0,0,0,0.3); }
.upload-btn span { margin-right: 10px; font-size: 20px; }

/* تكبير المربعات المنبثقة */
.modal {
  display: none; position: fixed; inset: 0; 
  background: rgba(0,0,0,0.85); z-index: 2000;
  justify-content: center; align-items: center;
}
.modal-content {
  background: white; padding: 40px; border-radius: 20px;
  width: 90%; max-width: 550px; /* تم تكبير العرض */
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}
.modal-content h3 { font-size: 24px; margin-bottom: 20px; color: var(--primary); font-weight: bold; }
.modal-content input { 
  width: 100%; border: 2px solid #eee; padding: 15px; 
  rounded: 10px; margin-bottom: 15px; font-size: 16px;
  outline: none; transition: 0.3s;
}
.modal-content input:focus { border-color: var(--gold); }

.main-btn {
  width: 100%; background: var(--primary); color: white;
  padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold;
}

@media (max-width: 500px) {
  .book-container { aspect-ratio: 4/5; }
}
</style>
</head>
<body>

<div class="upload-btn" onclick="openModal('authModal')">
  <span>📤</span> رفع ملفات
</div>

<div class="book-container">
  <div class="book" id="book">
    <div class="page" id="p0" onclick="toggleFlip(this)">
      <div class="page-front cover">
        <h1 class="font-bold text-3xl mb-4" style="font-family:'Amiri'">ملف الإنجاز</h1>
        <p class="text-sm">تصميم مهند علي حسين</p>
        <div class="mt-10 opacity-50 text-xs">انقر للبدء</div>
      </div>
      <div class="page-back"></div>
    </div>
  </div>
</div>

<div class="nav-controls">
  <button class="btn-circle" onclick="flipPrev()">▶</button>
  <button class="btn-circle" onclick="flipNext()">◀</button>
</div>

<div id="authModal" class="modal">
  <div class="modal-content">
    <h3>🔐 دخول المسؤول</h3>
    <input type="password" id="adminPass" placeholder="أدخل كلمة السر الخاصة بك">
    <button id="loginBtn" class="main-btn">دخول</button>
    <button onclick="closeModal('authModal')" class="w-full mt-4 text-gray-500">إلغاء</button>
  </div>
</div>

<div id="addModal" class="modal">
  <div class="modal-content">
    <h3>🆕 إضافة عمل جديد</h3>
    <p class="text-sm text-gray-500 mb-2">رابط Google Drive:</p>
    <input type="text" id="driveLink" placeholder="https://drive.google.com/...">
    <p class="text-sm text-gray-500 mb-2">الملاحظات / اسم العمل:</p>
    <input type="text" id="pageDesc" placeholder="مثال: تصميم شعار شركة المراعي">
    <button id="savePageBtn" class="main-btn" style="background: var(--gold); color: #2c3e50;">حفظ</button>
    <button onclick="closeModal('addModal')" class="w-full mt-4 text-gray-500">إغلاق</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD-sGsgLVZSidrgiAuP7NkDr3zKaCdRPEY",
    authDomain: "book-552.firebaseapp.com",
    projectId: "book-552",
    storageBucket: "book-552.firebasestorage.app",
    messagingSenderId: "252586078518",
    appId: "1:252586078518:web:2fe02dac779c3da4d74397"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const pagesCol = collection(db, "portfolio_pages");

  let pagesData = [];

  onSnapshot(query(pagesCol, orderBy("createdAt", "asc")), (snapshot) => {
    pagesData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderPages();
  });

  function renderPages() {
    const book = document.getElementById('book');
    const firstPage = document.getElementById('p0');
    book.innerHTML = '';
    book.appendChild(firstPage);

    pagesData.forEach((data, index) => {
      const page = document.createElement('div');
      page.className = 'page';
      page.onclick = function() { toggleFlip(this); };
      page.innerHTML = `
        <div class="page-front">
          <img src="https://drive.google.com/thumbnail?id=${data.driveId}&sz=w800" class="page-image">
          <p class="text-center mt-6 font-bold text-xl text-gray-700">${data.desc || ''}</p>
          <button onclick="deletePage(event, '${data.id}')" class="text-red-400 text-sm mt-auto">حذف الصفحة</button>
        </div>
        <div class="page-back"></div>
      `;
      book.appendChild(page);
    });

    const end = document.createElement('div');
    end.className = 'page';
    end.innerHTML = '<div class="page-front cover"><h2>تم بحمد الله</h2><p class="text-xs mt-4">تصميم مهند علي حسين</p></div><div class="page-back"></div>';
    book.appendChild(end);
    updateZIndex();
  }

  window.toggleFlip = function(el) {
    el.classList.toggle('flipped');
    updateZIndex();
  }

  window.updateZIndex = function() {
    const pages = document.querySelectorAll('.page');
    pages.forEach((page, i) => {
      if (page.classList.contains('flipped')) {
        page.style.zIndex = i;
        page.style.opacity = "0";
        setTimeout(() => { if(!page.classList.contains('flipped')) page.style.opacity = "1"; }, 600);
      } else {
        page.style.zIndex = pages.length - i;
        page.style.opacity = "1";
      }
    });
    const current = [...pages].find(p => !p.classList.contains('flipped'));
    if(current) current.style.opacity = "1";
  }

  window.flipNext = () => {
    const page = [...document.querySelectorAll('.page')].find(p => !p.classList.contains('flipped'));
    if (page) toggleFlip(page);
  }

  window.flipPrev = () => {
    const pages = [...document.querySelectorAll('.page')];
    const page = pages.reverse().find(p => p.classList.contains('flipped'));
    if (page) toggleFlip(page);
  }

  window.openModal = (id) => document.getElementById(id).style.display = 'flex';
  window.closeModal = (id) => document.getElementById(id).style.display = 'none';

  document.getElementById('loginBtn').onclick = () => {
    if(document.getElementById('adminPass').value === "4753") {
      closeModal('authModal'); openModal('addModal');
    } else alert("كلمة السر غير صحيحة");
  };

  document.getElementById('savePageBtn').onclick = async () => {
    const link = document.getElementById('driveLink').value;
    const driveId = link.match(/(?:\/d\/|id=)([\w-]+)/)?.[1];
    if(driveId) {
      await addDoc(pagesCol, { 
        driveId, 
        desc: document.getElementById('pageDesc').value, 
        createdAt: Date.now() 
      });
      alert("✅ تم إضافة الصورة بنجاح"); // رسالة النجاح المطلوبة
      document.getElementById('driveLink').value = "";
      document.getElementById('pageDesc').value = "";
      closeModal('addModal');
    } else {
      alert("عفواً، الرابط غير صحيح");
    }
  };

  window.deletePage = async (e, id) => {
    e.stopPropagation();
    if(confirm("هل أنت متأكد من حذف هذه الصفحة؟")) await deleteDoc(doc(db, "portfolio_pages", id));
  }
</script>
</body>
</html>
