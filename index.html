<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة وإحصاء HAMS السحابي</title>
    <style>
        /* التنسيق العام للنظام المظلم */
        body { background: #121212; color: #fff; font-family: system-ui, -apple-system, sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* شاشة تسجيل الدخول */
        .login-card { background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); margin-top: 10vh; }
        
        /* لوحة التحكم (مخفية في البداية) */
        #dashboardPage { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; }
        .form-section { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        
        /* العناصر المشتركة */
        .form-control { background: #2d2d2d; border: 1px solid #444; color: #fff; width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .btn { border: none; width: 100%; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-primary { background: #007bff; }
        .btn-success { background: #28a745; }
        .btn-danger { background: #dc3545; width: auto; padding: 8px 15px; }
        
        /* الجدول والسجلات */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        .data-table th, .data-table td { padding: 12px; text-align: right; border-bottom: 1px solid #333; }
        .data-table th { background: #007bff; color: white; }
        .error-msg { color: #ff6b6b; font-size: 14px; text-align: center; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">

    <!-- ================= 1️⃣ شاشة تسجيل الدخول ================= -->
    <div id="loginPage" class="login-card">
        <h3 style="text-align: center; margin-bottom: 5px; color: #007bff;">نظام إدارة HAMS</h3>
        <p style="text-align: center; color: #aaa; font-size: 14px; margin-bottom: 25px;">بوابة تسجيل الدخول الآمنة للموظفين</p>
        
        <div id="errorBox" class="error-msg"></div>
        
        <input type="email" id="email" class="form-control" placeholder="البريد الإلكتروني المعتمد" required>
        <input type="password" id="password" class="form-control" placeholder="كلمة المرور" required>
        
        <button id="loginBtn" class="btn btn-primary">تسجيل الدخول الآمن</button>
    </div>

    <!-- ================= 2️⃣ لوحة التحكم وإدخال البيانات ================= -->
    <div id="dashboardPage">
        <div class="header">
            <h2 style="font-size: 18px; margin: 0;">لوحة حصر منازل HAMS السحابية</h2>
            <button id="logoutBtn" class="btn btn-danger">خروج</button>
        </div>

        <div class="form-section">
            <h3 style="margin-top: 0; color: #28a745; font-size: 16px;">📝 استمارة تسجيل بيانات المنازل میدانياً</h3>
            <input type="number" id="houseNum" class="form-control" placeholder="رقم المنزل (من 1 إلى 700)" min="1" max="700" required>
            <input type="text" id="ownerName" class="form-control" placeholder="اسم الساكن / رئيس العائلة الكامل" required>
            <input type="text" id="notes" class="form-control" placeholder="ملاحظات ميدانية إضافية">
            <button id="saveBtn" class="btn btn-success">إرسال وحفظ البيانات سحابياً</button>
        </div>

        <h3>📊 السجلات المحفوظة في قاعدة البيانات حياً</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>رقم المنزل</th>
                    <th>اسم الساكن</th>
                    <th>الملاحظات</th>
                </tr>
            </thead>
            <tbody id="dataTableBody">
                <!-- البيانات تظهر هنا تلقائياً -->
            </tbody>
        </table>
    </div>

</div>

<!-- ================= 3️⃣ محرك تشغيل النظام والربط بالسيرفر ================= -->
<script type="module">
    // استدعاء حزم جوجل المباشرة
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // مفاتيح سيرفر المهندس مهند الحية
    const firebaseConfig = {
        apiKey: "AIzaSyBXiNgXPXF9Y7lnQCo_0R0SFrf2uppQ7kw",
        authDomain: "hams-system.firebaseapp.com",
        projectId: "hams-system",
        storageBucket: "hams-system.firebasestorage.app",
        messagingSenderId: "28774598116",
        appId: "1:28774598116:web:c168288f626a587d9c33f1"
    };

    // تهيئة الاتصال
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    auth.languageCode = 'ar';

    const loginPage = document.getElementById('loginPage');
    const dashboardPage = document.getElementById('dashboardPage');

    // مراقبة حالة المستخدم (هل مسجل دخول أم لا)
    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginPage.style.display = 'none';
            dashboardPage.style.display = 'block';
            loadHousesData();
        } else {
            loginPage.style.display = 'block';
            dashboardPage.style.display = 'none';
        }
    });

    // كود زر تسجيل الدخول
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorBox = document.getElementById('errorBox');
        errorBox.style.display = 'none';

        if(!email || !password) { errorBox.style.display = 'block'; errorBox.innerText = 'الرجاء ملء الحقول المطلوبة'; return; }

        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (error) {
            errorBox.style.display = 'block';
            if(error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                errorBox.innerText = 'عذراً، البريد الإلكتروني أو كلمة المرور غير صحيحة.';
            } else {
                errorBox.innerText = 'خطأ في الاتصال: ' + error.message;
            }
        }
    });

    // كود حفظ منزل جديد في السيرفر
    document.getElementById('saveBtn').addEventListener('click', async () => {
        const houseNum = document.getElementById('houseNum').value;
        const ownerName = document.getElementById('ownerName').value;
        const notes = document.getElementById('notes').value;

        if(!houseNum || !ownerName) { alert('الرجاء إدخال رقم المنزل واسم الساكن!'); return; }

        try {
            await addDoc(collection(db, "houses"), {
                houseNumber: parseInt(houseNum),
                ownerName: ownerName,
                notes: notes,
                timestamp: new Date()
            });
            alert('✅ تم حفظ بيانات المنزل بنجاح في سيرفر جوجل السحابي!');
            document.getElementById('houseNum').value = '';
            document.getElementById('ownerName').value = '';
            document.getElementById('notes').value = '';
            loadHousesData();
        } catch (error) {
            alert('حدث خطأ أثناء الحفظ: ' + error.message);
        }
    });

    // كود جلب السجلات وعرضها في الجدول تلقائياً
    async function loadHousesData() {
        const tbody = document.getElementById('dataTableBody');
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">جاري تحميل البيانات الحية من السيرفر...</td></tr>';
        
        try {
            const q = query(collection(db, "houses"), orderBy("houseNumber", "asc"));
            const querySnapshot = await getDocs(q);
            tbody.innerHTML = '';
            
            if(querySnapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#aaa;">لا توجد سجلات محفوظة حالياً.</td></tr>';
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                tbody.innerHTML += `
                    <tr>
                        <td><strong>المنزل رقم ${data.houseNumber}</strong></td>
                        <td>${data.ownerName}</td>
                        <td>${data.notes || '-'}</td>
                    </tr>
                `;
            });
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:red;">خطأ أثناء جلب البيانات: ${error.message}</td></tr>`;
        }
    }

    // كود تسجيل الخروج
    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth);
    });
</script>

</body>
</html>
