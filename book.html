<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملف الإنجاز - تصميم مهند علي حسين</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
<style>
:root { --primary:#2c3e50; --gold:#d4af37; --paper:#f9f7f1; }
body {
  font-family:'Cairo',sans-serif;
  background: radial-gradient(circle, #e0e0e0 0%, #bdc3c7 100%);
  margin:0; min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.book-container { perspective:2000px; width:90vw; max-width:600px; aspect-ratio:3/4; margin:20px auto; }
.book { width:100%; height:100%; position:relative; transform-style:preserve-3d; }
.page {
  width:100%; height:100%; position:absolute; top:0; left:0;
  transform-origin:right center; transition:transform .8s;
  transform-style:preserve-3d; background:var(--paper);
  box-shadow: inset -5px 0 10px rgba(0,0,0,.05), 0 5px 15px rgba(0,0,0,.2);
  border-radius:5px 15px 15px 5px; overflow:hidden; cursor:pointer;
}
.page.flipped { transform:rotateY(180deg); }
.page-front,.page-back {
  position:absolute; inset:0; backface-visibility:hidden;
  display:flex; flex-direction:column; padding:20px;
}
.page-back { transform:rotateY(180deg); background:#f0f0f0; }
.cover {
  background:linear-gradient(135deg,var(--primary),#1a252f);
  color:var(--gold); display:flex; align-items:center; justify-content:center;
  text-align:center; border-right:12px solid var(--gold);
}
.cover h1 { font-family:'Amiri',serif; font-size:3rem; margin:1rem 0; }
.cover-ornament { width:80%; height:2px; background:var(--gold); margin:20px 0; position:relative; }
.cover-ornament::after {
  content:'❖'; position:absolute; top:-15px; left:50%; transform:translateX(-50%);
  background:var(--primary); padding:0 10px;
}
.page-image { width:100%; height:85%; object-fit:contain; background:#fff; border-radius:4px; }
.nav-controls,.action-buttons { display:flex; gap:10px; }
.nav-controls { margin-top:10px; }
.action-buttons { position:fixed; top:20px; left:20px; flex-direction:column; z-index:1000; }
.mini-btn {
  width:42px; height:42px; border-radius:50%;
  border:none; background:rgba(44,62,80,.92); color:#d4af37;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:20px;
  box-shadow:0 6px 15px rgba(0,0,0,.25);
  transition:all .25s ease;
}
.mini-btn:hover {
  transform:scale(1.08);
  background:#1f2d3a;
  box-shadow:0 8px 20px rgba(0,0,0,.35);
}
.btn,.btn-circle {
  background:var(--primary); color:var(--gold); border:2px solid var(--gold);
  cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,.3);
}
.btn { padding:10px 16px; border-radius:8px; color:#fff; border:none; }
.btn-circle {
  width:50px; height:50px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
}
.admin-btn {
  position:fixed; bottom:20px; left:20px; background:var(--primary); color:#fff;
  padding:8px 15px; border-radius:20px; opacity:.5; cursor:pointer;
}
.modal {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.8);
  justify-content:center; align-items:center; z-index:2000;
}
.modal-content {
  background:#fff; padding:30px; border-radius:15px; width:min(400px,90vw);
}
input { width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:8px; }
.footer-text { margin-top:20px; font-size:.9rem; color:#555; font-weight:bold; }
@media print {
  .action-buttons,.nav-controls,.admin-btn,.footer-text,.delete-btn { display:none !important; }
  body { background:#fff; }
}
</style>
</head>
<body>

<div class="action-buttons">
  <button onclick="window.print()" class="mini-btn" title="طباعة">🖨️</button>
  <button onclick="copyShareLink()" class="mini-btn" title="مشاركة">🔗</button>
</div>

<div class="book-container">
  <div class="book" id="book">
    <div class="page" onclick="toggleFlip(this)">
      <div class="page-front cover">
        <div>بسم الله الرحمن الرحيم</div>
        <div class="cover-ornament"></div>
        <h1>ملف الإنجاز</h1>
        <div>تصميم مهند علي حسين</div>
        <div class="cover-ornament"></div>
        <p>انقر لتقليب الصفحة</p>
      </div>
      <div class="page-back"></div>
    </div>
  </div>
</div>

<div class="nav-controls">
  <button class="btn-circle" onclick="flipPrev()">◀</button>
  <button class="btn-circle" onclick="flipNext()">▶</button>
</div>

<div class="footer-text">تصميم مهند علي حسين 2026</div>
<div class="admin-btn" onclick="openModal('authModal')">+ إدارة الملف</div>

<div id="authModal" class="modal">
  <div class="modal-content">
    <h3>دخول المسؤول</h3>
    <input type="password" id="adminPass" placeholder="أدخل الرقم السري">
    <button onclick="verifyPassword()" class="btn" style="width:100%">دخول</button>
    <button onclick="closeModal('authModal')" class="btn" style="width:100%; margin-top:8px; background:#777">إلغاء</button>
  </div>
</div>

<div id="addModal" class="modal">
  <div class="modal-content">
    <h3>إضافة صفحة جديدة</h3>
    <input type="text" id="driveLink" placeholder="رابط Google Drive">
    <input type="text" id="pageDesc" placeholder="وصف الصورة">
    <button onclick="addNewPage()" class="btn" style="width:100%; background:#d4af37; color:#000">إضافة</button>
    <button onclick="closeModal('addModal')" class="btn" style="width:100%; margin-top:8px; background:#777">إغلاق</button>
  </div>
</div>

<script>
const SECRET_CODE = "4753";
const book = document.getElementById('book');
let pagesData = [];

function extractId(url) {
  const match = url.match(/(?:\/d\/|id=)([\w-]+)/);
  return match ? match[1] : null;
}

function getImageUrl(id) {
  return `https://drive.google.com/thumbnail?id=${id}&sz=w2000`;
}

function encodeData(data) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}

function decodeData(str) {
  return JSON.parse(decodeURIComponent(escape(atob(str))));
}

function loadPages() {
  const params = new URLSearchParams(location.search);
  const data = params.get('data');

  if (data) {
    try {
      pagesData = decodeData(data);
      localStorage.setItem('portfolioPages', JSON.stringify(pagesData));
      return;
    } catch (e) {
      console.error(e);
    }
  }

  pagesData = JSON.parse(localStorage.getItem('portfolioPages') || '[]');
}

function updateShareableLink() {
  const encoded = encodeData(pagesData);
  const newUrl = `${location.origin}${location.pathname}?data=${encoded}`;
  history.replaceState({}, '', newUrl);
  localStorage.setItem('portfolioPages', JSON.stringify(pagesData));
  return newUrl;
}

async function copyShareLink() {
  const url = updateShareableLink();
  try {
    await navigator.clipboard.writeText(url);
    alert('تم نسخ رابط المشاركة بنجاح.');
  } catch {
    prompt('انسخ هذا الرابط:', url);
  }
}

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function verifyPassword() {
  if (document.getElementById('adminPass').value === SECRET_CODE) {
    closeModal('authModal');
    openModal('addModal');
  } else {
    alert('الرمز غير صحيح');
  }
}

function addNewPage() {
  const link = document.getElementById('driveLink').value.trim();
  const desc = document.getElementById('pageDesc').value.trim();
  const id = extractId(link);

  if (!id) {
    alert('رابط غير صحيح');
    return;
  }

  pagesData.push({id, desc});
  renderPages();
  updateShareableLink();

  document.getElementById('driveLink').value = '';
  document.getElementById('pageDesc').value = '';
  closeModal('addModal');
}

function secureDeletePage(e, index) {
  e.stopPropagation();
  const pass = prompt('أدخل الرقم السري لحذف الصفحة:');
  if (pass !== SECRET_CODE) {
    alert('الرقم السري غير صحيح');
    return;
  }
  deletePage(e, index);
}

function deletePage(e, index) {
  e.stopPropagation();
  if (!confirm('حذف هذه الصفحة؟')) return;
  pagesData.splice(index, 1);
  renderPages();
  updateShareableLink();
}

function renderPages() {
  document.querySelectorAll('.page').forEach((p, i) => { if (i > 0) p.remove(); });

  pagesData.forEach((data, index) => {
    const page = document.createElement('div');
    page.className = 'page';
    page.onclick = function(){ toggleFlip(this); };
    page.innerHTML = `
      <div class="page-front">
        <img src="${getImageUrl(data.id)}" class="page-image" loading="lazy"
             onerror="this.src=''; this.alt='تأكد أن الصورة متاحة لأي شخص لديه الرابط';">
        <div style="margin-top:10px; text-align:center; color:#555;">${data.desc || ''}</div>
        <button class="delete-btn" onclick="secureDeletePage(event, ${index})"
                style="position:absolute; top:8px; right:8px; color:#c00; background:none; border:none; cursor:pointer;">
          حذف
        </button>
      </div>
      <div class="page-back"></div>
    `;
    book.appendChild(page);
  });

  const endPage = document.createElement('div');
  endPage.className = 'page';
  endPage.onclick = function(){ toggleFlip(this); };
  endPage.innerHTML = `
    <div class="page-front cover" style="background:#ecf0f1; color:#2c3e50; border-right:none; border-left:12px solid #d4af37;">
      <div class="cover-ornament"></div>
      <h2 style="font-size:2rem;">تم بحمد الله</h2>
      <p>نهاية ملف الإنجاز</p>
      <div class="cover-ornament"></div>
    </div>
    <div class="page-back"></div>
  `;
  book.appendChild(endPage);
  updateZIndex();
}

function toggleFlip(el) { el.classList.toggle('flipped'); updateZIndex(); }

function flipNext() {
  const page = [...document.querySelectorAll('.page')].find(p => !p.classList.contains('flipped'));
  if (page) { page.classList.add('flipped'); updateZIndex(); }
}

function flipPrev() {
  const pages = [...document.querySelectorAll('.page')];
  const page = pages.reverse().find(p => p.classList.contains('flipped'));
  if (page) { page.classList.remove('flipped'); updateZIndex(); }
}

function updateZIndex() {
  const pages = document.querySelectorAll('.page');
  pages.forEach((page, i) => {
    page.style.zIndex = page.classList.contains('flipped') ? i : (pages.length - i);
  });
}

window.onload = function() {
  loadPages();
  renderPages();
  if (pagesData.length) updateShareableLink();
};
</script>
</body>
</html>
