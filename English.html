<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learn English Letters</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    @keyframes popup{
      0%{
        transform: scale(.5) rotate(-10deg);
        opacity:0;
      }
      100%{
        transform: scale(1) rotate(0deg);
        opacity:1;
      }
    }

    @keyframes float{
      0%,100%{ transform:translateY(0px); }
      50%{ transform:translateY(-10px); }
    }

    .popup-animation{
      animation: popup .5s ease;
    }

    .floating{
      animation: float 2s infinite ease-in-out;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-cyan-100 via-blue-200 to-pink-100 min-h-screen p-6">

  <div class="max-w-7xl mx-auto">

    <div class="text-center mb-10">
      <h1 class="text-5xl font-black text-blue-700 drop-shadow-lg mb-4 animate-bounce">
        🌟 Learn English Letters 🌟
      </h1>

      <p class="text-xl text-gray-700 font-bold">
        Click any letter to hear pronunciation
      </p>
    </div>

    <div id="lettersGrid"
      class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
    </div>
  </div>

  <!-- POPUP -->

  <div id="popup"
    class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">

    <div class="popup-animation bg-white rounded-[40px] shadow-2xl p-8 max-w-md w-[90%] relative overflow-hidden">

      <div class="absolute -top-10 -right-10 w-32 h-32 bg-pink-300 rounded-full blur-3xl opacity-50"></div>
      <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-cyan-300 rounded-full blur-3xl opacity-50"></div>

      <button onclick="closePopup()"
        class="absolute top-4 left-4 bg-red-500 hover:bg-red-600 text-white w-10 h-10 rounded-full text-xl font-bold shadow-lg">
        ✕
      </button>

      <div class="relative z-10 text-center">

        <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-gradient-to-r from-yellow-300 to-orange-400 mb-6 shadow-2xl floating">

          <span id="popupLetter"
            class="text-5xl font-black text-white">
          </span>

        </div>

        <div id="popupImage"
          class="text-9xl mb-6 animate-bounce">
        </div>

        <h2 id="popupWord"
          class="text-5xl font-black text-pink-600 mb-4">
        </h2>

        <button onclick="repeatSpeech()"
          class="mt-4 px-8 py-4 bg-gradient-to-r from-blue-500 to-cyan-500 text-white rounded-2xl text-xl font-bold shadow-xl hover:scale-110 transition-all duration-300">

          🔊 Listen
        </button>

      </div>
    </div>
  </div>

  <script>

    const letters = [

      { letter:'A', word:'Apple', image:'🍎' },
      { letter:'B', word:'Ball', image:'⚽' },
      { letter:'C', word:'Cat', image:'🐱' },
      { letter:'D', word:'Dog', image:'🐶' },
      { letter:'E', word:'Elephant', image:'🐘' },
      { letter:'F', word:'Fish', image:'🐟' },
      { letter:'G', word:'Giraffe', image:'🦒' },
      { letter:'H', word:'Horse', image:'🐎' },
      { letter:'I', word:'Ice Cream', image:'🍦' },
      { letter:'J', word:'Juice', image:'🧃' },
      { letter:'K', word:'Kite', image:'🪁' },
      { letter:'L', word:'Lion', image:'🦁' },
      { letter:'M', word:'Monkey', image:'🐵' },
      { letter:'N', word:'Nurse', image:'👩‍⚕️' },
      { letter:'O', word:'Orange', image:'🍊' },
      { letter:'P', word:'Parrot', image:'🦜' },
      { letter:'Q', word:'Queen', image:'👑' },
      { letter:'R', word:'Rabbit', image:'🐰' },
      { letter:'S', word:'Sun', image:'☀️' },
      { letter:'T', word:'Tiger', image:'🐯' },
      { letter:'U', word:'Umbrella', image:'☂️' },
      { letter:'V', word:'Violin', image:'🎻' },
      { letter:'W', word:'Whale', image:'🐋' },
      { letter:'X', word:'Xylophone', image:'🎼' },
      { letter:'Y', word:'Yacht', image:'🛥️' },
      { letter:'Z', word:'Zebra', image:'🦓' },

    ];

    const grid = document.getElementById('lettersGrid');
    const popup = document.getElementById('popup');

    let currentWord = '';

    letters.forEach(item => {

      const card = document.createElement('div');

      card.className =
      'group cursor-pointer transform hover:scale-110 transition-all duration-500';

      card.innerHTML = `
        <div class="bg-white/80 backdrop-blur-lg rounded-3xl shadow-2xl border-4 border-white overflow-hidden hover:rotate-2 hover:shadow-pink-300 transition-all duration-500">

          <div class="bg-gradient-to-r from-yellow-300 to-orange-400 p-3 text-center">

            <span class="text-4xl font-black text-white drop-shadow-lg">
              ${item.letter}
            </span>

          </div>

          <div class="h-36 flex items-center justify-center bg-gradient-to-b from-sky-100 to-cyan-200 text-7xl group-hover:animate-bounce">

            ${item.image}

          </div>

          <div class="p-4 text-center">

            <h2 class="text-2xl font-extrabold text-pink-600">
              ${item.word}
            </h2>

          </div>

        </div>
      `;

      card.onclick = () => openPopup(item);

      grid.appendChild(card);
    });

    function openPopup(item){

      document.getElementById('popupLetter').textContent = item.letter;
      document.getElementById('popupImage').textContent = item.image;
      document.getElementById('popupWord').textContent = item.word;

      currentWord = item.word;

      popup.classList.remove('hidden');

      speak(item.word);
    }

    function closePopup(){

      popup.classList.add('hidden');

      speechSynthesis.cancel();
    }

    function speak(word){

      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(word);

      utterance.lang = 'en-US';
      utterance.rate = 0.8;
      utterance.pitch = 1;

      const voices = speechSynthesis.getVoices();

      const englishVoice = voices.find(
        voice => voice.lang.includes('en')
      );

      if(englishVoice){
        utterance.voice = englishVoice;
      }

      speechSynthesis.speak(utterance);
    }

    function repeatSpeech(){
      speak(currentWord);
    }

    window.onclick = function(event){

      if(event.target === popup){
        closePopup();
      }
    }

  </script>

</body>
</html>
